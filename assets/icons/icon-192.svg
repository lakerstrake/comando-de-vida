<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="layerGrad1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="layerGrad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="layerGrad3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="192" height="192" rx="38" fill="#0f172a"/>
  <!-- Bottom layer (largest) -->
  <rect x="44" y="88" width="104" height="64" rx="10" fill="url(#layerGrad3)" opacity="0.55"/>
  <!-- Middle layer -->
  <rect x="52" y="68" width="88" height="64" rx="10" fill="url(#layerGrad2)" opacity="0.75"/>
  <!-- Top layer (smallest, most prominent) -->
  <rect x="60" y="48" width="72" height="64" rx="10" fill="url(#layerGrad1)"/>
  <!-- Upward arrow / chevron on top layer -->
  <polyline points="82,88 96,72 110,88" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
