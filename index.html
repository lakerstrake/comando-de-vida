<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#ffffff">
    <meta name="description" content="Comando Vida 2.0 - Tu centro de mando personal basado en neurociencia">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Comando Vida 2.0</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#128640;</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="app">
        <!-- Sidebar Navigation (Desktop) -->
        <nav class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2 class="logo">&#128640; Comando Vida</h2>
                <span class="logo-sub">2.0</span>
            </div>
            <div class="nav-links">
                <a href="#/dashboard" class="nav-item active">
                    <span class="nav-icon">&#9776;</span>
                    <span class="nav-label">Dashboard</span>
                </a>
                <a href="#/habits" class="nav-item">
                    <span class="nav-icon">&#9876;</span>
                    <span class="nav-label">H&aacute;bitos</span>
                </a>
                <a href="#/goals" class="nav-item">
                    <span class="nav-icon">&#127919;</span>
                    <span class="nav-label">Metas</span>
                </a>
                <a href="#/planner" class="nav-item">
                    <span class="nav-icon">&#128197;</span>
                    <span class="nav-label">Planificador</span>
                </a>
                <a href="#/journal" class="nav-item">
                    <span class="nav-icon">&#9997;</span>
                    <span class="nav-label">Diario</span>
                </a>
                <a href="#/lifewheel" class="nav-item">
                    <span class="nav-icon">&#9678;</span>
                    <span class="nav-label">Rueda de Vida</span>
                </a>
                <a href="#/stats" class="nav-item">
                    <span class="nav-icon">&#128202;</span>
                    <span class="nav-label">Estad&iacute;sticas</span>
                </a>
                <a href="#/review" class="nav-item">
                    <span class="nav-icon">&#128221;</span>
                    <span class="nav-label">Revisi&oacute;n Semanal</span>
                </a>
            </div>
            <div class="sidebar-footer">
                <button class="nav-item" id="settings-btn">
                    <span class="nav-icon">&#9881;</span>
                    <span class="nav-label">Configuraci&oacute;n</span>
                </button>
            </div>
        </nav>

        <!-- Main Content Area -->
        <main class="main-area">
            <div id="main-content" class="content"></div>
        </main>

        <!-- Bottom Navigation (Mobile) -->
        <nav class="bottom-nav">
            <a href="#/dashboard" class="bottom-nav-item active">
                <span class="bottom-nav-icon">&#9776;</span>
                <span class="bottom-nav-label">Inicio</span>
            </a>
            <a href="#/habits" class="bottom-nav-item">
                <span class="bottom-nav-icon">&#9876;</span>
                <span class="bottom-nav-label">H&aacute;bitos</span>
            </a>
            <a href="#/planner" class="bottom-nav-item">
                <span class="bottom-nav-icon">&#128197;</span>
                <span class="bottom-nav-label">Plan</span>
            </a>
            <a href="#/journal" class="bottom-nav-item">
                <span class="bottom-nav-icon">&#9997;</span>
                <span class="bottom-nav-label">Diario</span>
            </a>
            <a href="#/stats" class="bottom-nav-item">
                <span class="bottom-nav-icon">&#128202;</span>
                <span class="bottom-nav-label">Stats</span>
            </a>
            <button class="bottom-nav-item" id="settings-btn-mobile">
                <span class="bottom-nav-icon">&#9881;</span>
                <span class="bottom-nav-label">Config</span>
            </button>
        </nav>
    </div>

    <!-- Modal Overlay -->
    <div id="modal-overlay" class="modal-overlay">
        <div id="modal" class="modal glass-card"></div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>

    <script type="module" src="js/app.js"></script>
    <script>
        // Register Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('SW registered:', reg.scope))
                    .catch(err => console.log('SW registration failed:', err));
            });
        }
    </script>
</body>
</html>
